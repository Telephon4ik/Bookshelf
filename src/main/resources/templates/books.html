<!--
  ============================================================================
  FILE: books.html
  DESCRIPTION: Главная страница со списком всех книг пользователя
  FEATURES: Таблица с книгами, пагинация, поиск, фильтрация, сортировка
  DEPENDENCIES: styles.css, books-sort.js
  ============================================================================
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои книги - Bookshelf</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Верхняя панель навигации -->
<div class="top-bar">
    <div class="logo-area"><span class="app-title">Bookshelf</span></div>
    <div class="nav-links">
        <a href="/" class="nav-link"><img src="/icons/nav/icon-library.png" alt="Главная"><span>Главная</span></a>
        <a href="/books" class="nav-link active"><img src="/icons/nav/icon-books-list.png" alt="Книги"><span>Мои книги</span></a>
        <a href="/shelves" class="nav-link"><img src="/icons/misc/icon-shelf-empty.png" alt="Полки"><span>Полки</span></a>
        <a href="/stats" class="nav-link"><img src="/icons/nav/icon-stats-chart.png" alt="Статистика"><span>Статистика</span></a>
        <a href="/reports/unread" class="nav-link"><img src="/icons/nav/icon-report.png" alt="Отчёты"><span>Отчёты</span></a>
    </div>
    <div></div>
</div>

<!-- Основной контейнер -->
<div class="container">
    <!-- Заголовок и панель инструментов -->
    <div class="page-header">
        <h1>Мои книги</h1>
        <div class="toolbar">
            <!-- Форма поиска -->
            <form th:action="@{/books}" method="get" class="search-box">
                <img src="/icons/search/icon-search-magnifier.png" alt="Поиск" width="18" height="18">
                <input type="text" name="search" placeholder="Поиск книг..." th:value="${currentSearch}">
                <input type="hidden" name="size" th:value="${pageSize}">
                <input type="hidden" name="sort" th:value="${currentSort}">
                <input type="hidden" name="page" th:value="0">
                <button type="submit"><img src="/icons/action/icon-forward-arrow.png" alt="Найти" width="16" height="16"></button>
            </form>
            <!-- Кнопка фильтра -->
            <a th:href="@{/books/filter(size=${pageSize}, sort=${currentSort})}" class="icon-btn">
                <img src="/icons/search/icon-filter-funnel.png" alt="Фильтр">
                <span>Фильтр</span>
            </a>
            <!-- Выпадающее меню сортировки -->
            <div class="sort-wrapper" id="sortWrapper">
                <div class="sort-trigger" id="sortTrigger">
                    <img src="/icons/sort/icon-sort-arrows.png" alt="Сортировка">
                    <span id="sortLabel" th:text="${currentSortLabel}">Сортировка</span>
                    <img src="/icons/action/icon-forward-arrow.png" class="arrow-down" alt="▼">
                </div>
                <div class="sort-dropdown" id="sortDropdown">
                    <th:block th:each="option : ${sortOptions}">
                        <div th:if="${option == null}" class="sort-divider"></div>
                        <a th:unless="${option == null}"
                           th:href="@{/books(page=0, size=${pageSize}, sort=${option.value}, search=${currentSearch})}"
                           class="sort-option"
                           th:classappend="${currentSort == option.value} ? 'active'"
                           th:data-value="${option.value}">
                            <img th:src="@{|/icons/sort/${option.icon}|}" th:alt="${option.label}">
                            <span th:text="${option.label}"></span>
                        </a>
                    </th:block>
                </div>
            </div>
            <!-- Кнопка расширенного поиска -->
            <a href="/search" class="btn-secondary">
                <img src="/icons/search/icon-search-magnifier.png" alt="Поиск книг">
                <span>Поиск</span>
            </a>
            <!-- Кнопка добавления книги -->
            <a href="/books/add" class="btn-primary">
                <img src="/icons/action/icon-book-add.png" alt="Добавить">
                <span>Добавить книгу</span>
            </a>
        </div>
    </div>

    <!-- Блок отображения ошибок -->
    <div th:if="${error}" class="error-message">
        <img src="/icons/alerts/icon-error-cross.png" alt="Ошибка">
        <span th:text="${error}"></span>
    </div>

    <!-- Таблица с книгами -->
    <div th:if="${not #lists.isEmpty(books)}" class="books-table">
        <table>
            <thead>
            <tr>
                <th class="cover-column">Обложка</th>
                <th>Название</th>
                <th>Автор</th>
                <th>Жанр</th>
                <th>Статус</th>
                <th>Рейтинг</th>
                <th class="actions-cell">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <!-- Колонка с обложкой -->
                <td class="cover-column cover-cell">
                    <div th:if="${book.coverUrl != null and book.coverUrl != ''}">
                        <img th:src="${book.coverUrl}" alt="Обложка" class="book-cover-small"
                             onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'book-cover-placeholder-small\'><img src=\'/icons/misc/icon-cover-placeholder.png\' alt=\'Нет обложки\'></div>'">
                    </div>
                    <div th:unless="${book.coverUrl != null and book.coverUrl != ''}" class="book-cover-placeholder-small">
                        <img src="/icons/misc/icon-cover-placeholder.png" alt="Нет обложки">
                    </div>
                </td>
                <!-- Название книги с ссылкой на просмотр -->
                <td class="book-title-cell">
                    <a th:href="@{/books/view/{id}(id=${book.id})}" th:text="${book.title}"></a>
                </td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.genre != null ? book.genre : '-'}"></td>
                <!-- Статус с иконкой -->
                <td>
                        <span th:if="${book.status.name() == 'READ'}" class="status-badge status-read">
                            <img src="/icons/status/icon-status-read.png" alt="Прочитано" width="14" height="14">
                            <span th:text="${book.status.displayName}"></span>
                        </span>
                    <span th:if="${book.status.name() == 'WANT_TO_READ'}" class="status-badge status-planned">
                            <img src="/icons/status/icon-status-planned.png" alt="В планах" width="14" height="14">
                            <span th:text="${book.status.displayName}"></span>
                        </span>
                    <span th:if="${book.status.name() == 'IN_PROGRESS'}" class="status-badge status-progress">
                            <img src="/icons/status/icon-status-progress.png" alt="В процессе" width="14" height="14">
                            <span th:text="${book.status.displayName}"></span>
                        </span>
                </td>
                <!-- Рейтинг звёздами -->
                <td>
                    <div th:if="${book.rating != null and book.rating > 0}" class="rating-stars-small">
                        <th:block th:each="i : ${#numbers.sequence(1, book.rating)}">
                            <img src="/icons/rating/icon-star-filled.png" width="16" height="16" alt="★">
                        </th:block>
                        <th:block th:if="${book.rating % 1 != 0}">
                            <img src="/icons/rating/icon-star-half.png" width="16" height="16" alt="½">
                        </th:block>
                        <th:block th:each="i : ${#numbers.sequence(1, 5 - (book.rating % 1 == 0 ? book.rating : book.rating + 0.5))}">
                            <img src="/icons/rating/icon-star-empty.png" width="16" height="16" alt="☆">
                        </th:block>
                        <span class="rating-text-small">
                                <span th:if="${book.rating % 1 == 0}" th:text="${book.rating} + '.0'"></span>
                                <span th:unless="${book.rating % 1 == 0}" th:text="${book.rating}"></span>
                                /5
                            </span>
                    </div>
                    <span th:unless="${book.rating != null and book.rating > 0}">-</span>
                </td>
                <!-- Кнопки действий: просмотр, редактирование, удаление -->
                <td class="actions-cell">
                    <div class="actions-container">
                        <a th:href="@{/books/view/{id}(id=${book.id})}" class="action-link" title="Просмотр">
                            <img src="/icons/action/icon-view-eye.png" alt="Просмотр" width="18" height="18">
                        </a>
                        <a th:href="@{/books/edit/{id}(id=${book.id})}" class="action-link" title="Редактировать">
                            <img src="/icons/action/icon-edit-pencil.png" alt="Редактировать" width="18" height="18">
                        </a>
                        <a th:href="@{/books/delete/{id}(id=${book.id})}" class="action-link" title="Удалить"
                           onclick="return confirm('Вы уверены, что хотите удалить книгу?')">
                            <img src="/icons/action/icon-delete-bin.png" alt="Удалить" width="18" height="18">
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Состояние "нет книг" -->
    <div th:if="${#lists.isEmpty(books)}" class="empty-state">
        <img src="/icons/misc/icon-shelf-empty.png" alt="Пустая полка">
        <p>У вас пока нет книг. Начните с добавления первой!</p>
        <a href="/books/add">+ Добавить книгу</a>
    </div>

    <!-- Пагинация -->
    <div class="pagination" th:if="${totalPages > 0 and not #lists.isEmpty(books)}">
        <a th:href="@{/books(page=0, size=${pageSize}, sort=${currentSort}, search=${currentSearch})}" class="page-btn">«</a>
        <a th:each="i: ${#numbers.sequence(0, totalPages - 1)}"
           th:href="@{/books(page=${i}, size=${pageSize}, sort=${currentSort}, search=${currentSearch})}"
           class="page-btn"
           th:classappend="${i == currentPage} ? 'active'"
           th:text="${i+1}"></a>
        <a th:href="@{/books(page=${totalPages-1}, size=${pageSize}, sort=${currentSort}, search=${currentSearch})}" class="page-btn">»</a>
    </div>
</div>

<script th:src="@{/js/books-sort.js}"></script>

</body>
</html>
