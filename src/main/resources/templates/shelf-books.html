<!--
  ============================================================================
  FILE: shelf-books.html
  DESCRIPTION: Страница отображения книг на конкретной виртуальной полке (теге)
  FEATURES: Список книг, принадлежащих определенному тегу
  DEPENDENCIES: styles.css
  ============================================================================
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полка - Bookshelf</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Верхняя панель навигации -->
<div class="top-bar">
    <div class="logo-area"><span class="app-title">Bookshelf</span></div>
    <div class="nav-links">
        <a href="/" class="nav-link"><img src="/icons/nav/icon-library.png" alt="Главная"><span>Главная</span></a>
        <a href="/books" class="nav-link"><img src="/icons/nav/icon-books-list.png" alt="Книги"><span>Книги</span></a>
        <a href="/shelves" class="nav-link active"><img src="/icons/misc/icon-shelf-empty.png" alt="Полки"><span>Полки</span></a>
        <a href="/stats" class="nav-link"><img src="/icons/nav/icon-stats-chart.png" alt="Статистика"><span>Статистика</span></a>
    </div>
    <div></div>
</div>

<!-- Основной контейнер -->
<div class="container">
    <!-- Ссылка возврата ко всем полкам -->
    <a href="/shelves" class="back-link"><img src="/icons/action/icon-back-arrow.png" alt="Назад"><span>Все полки</span></a>

    <!-- Заголовок с названием полки -->
    <h1><img src="/icons/misc/icon-tag-label.png" alt="Полка"> <span th:text="${shelfName}"></span></h1>
    <p class="subtitle" th:text="${books.size()} + ' книг(и) на этой полке'"></p>

    <!-- Таблица с книгами -->
    <div class="books-table" th:if="${not #lists.isEmpty(books)}">
        <table>
            <thead>
            <tr>
                <th class="cover-column">Обложка</th>
                <th>Название</th>
                <th>Автор</th>
                <th>Статус</th>
                <th>Рейтинг</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <!-- Колонка с обложкой -->
                <td class="cover-column" style="width: 60px;">
                    <div th:if="${book.coverUrl != null and book.coverUrl != ''}">
                        <img th:src="${book.coverUrl}"
                             alt="Обложка"
                             class="book-cover-shelf"
                             onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'book-cover-placeholder-shelf\'><img src=\'/icons/misc/icon-cover-placeholder.png\' alt=\'Нет обложки\'></div>'">
                    </div>
                    <div th:unless="${book.coverUrl != null and book.coverUrl != ''}" class="book-cover-placeholder-shelf">
                        <img src="/icons/misc/icon-cover-placeholder.png" alt="Нет обложки">
                    </div>
                </td>
                <!-- Название книги с ссылкой на просмотр -->
                <td class="book-title">
                    <a th:href="@{/books/view/{id}(id=${book.id})}" th:text="${book.title}"></a>
                </td>
                <td th:text="${book.author}"></td>
                <!-- Статус с иконкой -->
                <td>
                    <span th:if="${book.status.name() == 'READ'}" class="status-badge status-read">
                        <img src="/icons/status/icon-status-read.png" alt="Прочитано" width="14" height="14">
                        <span th:text="${book.status.displayName}"></span>
                    </span>
                    <span th:if="${book.status.name() == 'WANT_TO_READ'}" class="status-badge status-planned">
                        <img src="/icons/status/icon-status-planned.png" alt="В планах" width="14" height="14">
                        <span th:text="${book.status.displayName}"></span>
                    </span>
                    <span th:if="${book.status.name() == 'IN_PROGRESS'}" class="status-badge status-progress">
                        <img src="/icons/status/icon-status-progress.png" alt="В процессе" width="14" height="14">
                        <span th:text="${book.status.displayName}"></span>
                    </span>
                </td>
                <!-- Рейтинг звёздами -->
                <td>
                    <div th:if="${book.rating != null and book.rating > 0}" class="rating-stars" style="display: inline-flex; align-items: center; gap: 2px;">
                        <th:block th:each="i : ${#numbers.sequence(1, book.rating)}">
                            <img src="/icons/rating/icon-star-filled.png" width="16" height="16" alt="★">
                        </th:block>
                        <th:block th:if="${book.rating % 1 != 0}">
                            <img src="/icons/rating/icon-star-half.png" width="16" height="16" alt="½">
                        </th:block>
                        <th:block th:each="i : ${#numbers.sequence(1, 5 - (book.rating % 1 == 0 ? book.rating : book.rating + 0.5))}">
                            <img src="/icons/rating/icon-star-empty.png" width="16" height="16" alt="☆">
                        </th:block>
                        <span style="margin-left: 4px; font-size: 12px; color: #7A6A5A;" th:text="${book.rating} + '/5'"></span>
                    </div>
                    <span th:unless="${book.rating != null and book.rating > 0}">-</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Состояние "нет книг на полке" -->
    <div th:if="${#lists.isEmpty(books)}" class="empty-state">
        <img src="/icons/misc/icon-shelf-empty.png" alt="Пустая полка">
        <p>На этой полке пока нет книг</p>
        <a href="/books/add" class="btn-primary" style="margin-top: 16px;">+ Добавить книгу</a>
    </div>
</div>

</body>
</html>
